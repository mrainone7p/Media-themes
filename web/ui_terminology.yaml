pages:
  configuration:
    title: Configuration
    description: Set up connections, libraries, discovery sources, and download preferences.
  database:
    title: Library
    description: Browse, review, preview, fine-tune, and manage themes in one place.
  schedule:
    title: Schedule
    description: Configure automated runs and manually trigger pipeline steps for the selected libraries.
  tasks:
    title: Tasks
    description: Run utilities, export curated data, perform maintenance, and review task/run history.
statuses:
  UNMONITORED:
    label: Unmonitored
    description: Hidden from automation until you re-enable this title.
  MISSING:
    label: Missing
    description: Needs a source because no local theme file is available yet.
  STAGED:
    label: Staged
    description: Source saved and waiting for approval before download.
  APPROVED:
    label: Approved
    description: Approved for download on the next run.
  AVAILABLE:
    label: Available
    description: Theme file is present locally and ready to use.
  FAILED:
    label: Failed
    description: Source discovery or download needs attention before retrying.
