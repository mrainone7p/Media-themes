pages:
  dashboard:
    title: Dashboard
    description: Review pipeline health, recent activity, and the next actions that need attention.
  configuration:
    title: Configuration
    description: Set up connections, libraries, discovery sources, and download preferences.
  database:
    title: Theme Manager
    description: Browse, filter, review, and manage theme items in one place.
  schedule:
    title: Scheduler
    description: Set what the automated schedule does, choose included libraries, and run the configured automation on demand.
  tasks:
    title: Tasks
    description: Run utilities, export curated data, perform maintenance, and review task/run history.
schedule:
  master:
    title: Automated Schedule
    description: Turn automated scheduling on or off. You can still run the saved Scheduler configuration on demand.
  summary:
    step1:
      label: STATUS KEY · Step 1
      title: ⟳ Scan Libraries
      description: Connects to Plex, indexes media, and checks whether each folder already has a local theme file. Items without a theme are marked Missing. Items with a theme are marked Available. Uses Plex only. Fast.
    step2:
      label: AUTO SCHEDULE · Step 2
      title: ⚡ Find Theme Sources
      description: Searches for theme sources for each Missing item using the configured search logic. When a source is found, the item moves to Staged. Items marked Unmonitored or Failed are ignored. Uses TMDB, YouTube, or Golden Source when configured.
    step3:
      label: PIPELINE STEPS · Step 3
      title: ↓ Download Themes
      description: Downloads themes for each Approved item, saves the theme file into the media folder, and moves the item to Available. Items marked Unmonitored or Failed are ignored. Uses yt-dlp and ffmpeg.
  cards:
    auto_schedule:
      title: AUTO SCHEDULE
    pipeline_steps:
      title: PIPELINE STEPS
      description: Choose which parts of the automated pipeline should run when the Scheduler configuration is triggered.
      step1:
        description: Connects to Plex, indexes media, and checks whether each folder already has a local theme file. Items without a theme are marked Missing. Items with a theme are marked Available. Uses Plex only. Fast.
      step2:
        description: Searches for theme sources for each Missing item using the configured search logic. When a source is found, the item moves to Staged. Items marked Unmonitored or Failed are ignored. Uses TMDB, YouTube, or Golden Source when configured.
        only_golden:
          title: Only use Golden Source
          description: Use a curated Golden Source for tighter, faster, and more reliable source discovery.
        limit:
          title: Missing Titles Per Run
          description: Limits how many Missing items are processed per run. 0 = unlimited.
      step3:
        description: Downloads themes for each Approved item, saves the theme file into the media folder, and moves the item to Available. Items marked Unmonitored or Failed are ignored. Uses yt-dlp and ffmpeg.
        auto_approve:
          title: Auto-Approve Staged Items
          description: Automatically move Staged items to Approved before downloading for a fully hands-off pipeline.
statuses:
  UNMONITORED:
    label: Unmonitored
    description: Hidden from automation until you re-enable this title.
  MISSING:
    label: Missing
    description: Needs a source because no local theme file is available yet.
  STAGED:
    label: Staged
    description: Source saved and waiting for approval before download.
  APPROVED:
    label: Approved
    description: Approved for download on the next run.
  AVAILABLE:
    label: Available
    description: Theme file is present locally and ready to use.
  FAILED:
    label: Failed
    description: Source discovery or download needs attention before retrying.
